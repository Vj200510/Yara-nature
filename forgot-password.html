<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password – Yara Nature</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="premium.css"/>
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#d4eed0,#f5f0e6);padding:20px;font-family:'Inter',sans-serif}
    .fp-card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 16px 56px rgba(0,0,0,.12);text-align:center}
    .fp-logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;color:#2d4a2b;margin-bottom:4px}
    .fp-tag{font-size:.7rem;color:#c9a227;font-style:italic;margin-bottom:28px;display:block}
    .fp-card h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#2d4a2b;margin-bottom:8px}
    .fp-card p{font-size:.88rem;color:#666;margin-bottom:24px;line-height:1.6}
    .fp-input{width:100%;padding:13px 16px;border:1.5px solid #ddd;border-radius:8px;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:16px;transition:border-color .2s}
    .fp-input:focus{border-color:#2d4a2b}
    .fp-btn{width:100%;padding:14px;background:#2d4a2b;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.9rem;cursor:pointer;margin-bottom:14px;transition:background .2s}
    .fp-btn:hover{background:#3a6135}
    .fp-back{font-size:.84rem;color:#2d4a2b;text-decoration:none;font-weight:600}
    .fp-back:hover{text-decoration:underline}
    .fp-success{display:none;background:#e8f5e0;border-radius:10px;padding:16px;color:#2d4a2b;font-weight:600;margin-bottom:16px}
    .fp-err{color:#e63f2e;font-size:.82rem;margin-bottom:12px;min-height:18px}
  </style>
</head>
<body>
<div class="fp-card">
  <div class="fp-logo">YARA NATURE</div>
  <span class="fp-tag">Pure Wellness from Nature</span>
  <h2>Forgot Password?</h2>
  <p>Enter your registered email address and we'll send you a password reset link.</p>
  <div class="fp-success" id="fpSuccess">
    ✅ Password reset email sent! Check your inbox and follow the link to reset your password.
  </div>
  <div class="fp-err" id="fpErr"></div>
  <input type="email" class="fp-input" id="fpEmail" placeholder="your@email.com" required/>
  <button class="fp-btn" id="fpBtn" onclick="sendReset()">Send Reset Link</button>
  <a href="index.html" class="fp-back">← Back to Home</a>
</div>
<script>
async function sendReset() {
  const email = document.getElementById('fpEmail').value.trim();
  const errEl = document.getElementById('fpErr');
  const btn   = document.getElementById('fpBtn');
  if (!email) { errEl.textContent = 'Please enter your email address'; return; }
  btn.textContent = 'Sending...';
  btn.disabled = true;
  errEl.textContent = '';
  try {
    const res = await fetch('https://yara-nature.onrender.com/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    document.getElementById('fpSuccess').style.display = 'block';
    document.getElementById('fpEmail').value = '';
  } catch(e) {
    errEl.textContent = 'Failed to send. Please try again or contact support.';
  } finally {
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
  }
}
document.getElementById('fpEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendReset();
});
</script>
</body>
</html>
